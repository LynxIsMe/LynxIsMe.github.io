email: lynxxu@ucsb.edu
github_username:  LynsIsMe

# Build settings
theme: minima

markdown: kramdown

kramdown:
  input: GFM

# Top nav (Minima automatically uses this)
header_pages:
  - index.md
  - blog.md
  - notes.md
  - tags.md
  - physics.md
  - software.md
  - hardware.md

# Notes as a separate collection (not mixed into blog posts)
collections:
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "notes"
    values:
      layout: note
